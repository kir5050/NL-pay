function MBMark({size=22, bg="#8B3DFF", ink="#FFFFFF", flat=false, radius=14}){
  // NL Континент mark: лаконичный NL в фирменной фиолетовой плашке
  return (

    </svg>
  );
}
function QRish({size=120, color="#0A0A0A", bg="transparent"}){
  const n=21, cell=size/n, mods=[];
  const inFinder=(r,c)=>{const f=(R,C)=>r>=R&&r<R+7&&c>=C&&c<C+7;return f(0,0)||f(0,n-7)||f(n-7,0);};
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){ if(inFinder(r,c))continue; if(((r*5+c*3+r*c+r)%4)===0) mods.push([r,c]); }
  const finder=(R,C,k)=>(
    <g key={k}>
      <rect x={C*cell} y={R*cell} width={7*cell} height={7*cell} fill={color}/>
      <rect x={(C+1)*cell} y={(R+1)*cell} width={5*cell} height={5*cell} fill={bg==="transparent"?"#fff":bg}/>
      <rect x={(C+2)*cell} y={(R+2)*cell} width={3*cell} height={3*cell} fill={color}/>
    </g>
  );
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} shapeRendering="crispEdges" style={{display:"block"}}>
      {bg!=="transparent" && <rect width={size} height={size} fill={bg}/>}
      {mods.map(([r,c],i)=><rect key={i} x={c*cell} y={r*cell} width={cell} height={cell} fill={color}/>)}
      {finder(0,0,"a")}{finder(0,n-7,"b")}{finder(n-7,0,"c")}
    </svg>
  );
}

/* ===== HOOKS ===== */
function useReveal(once=true, amount=0.2){
  const ref = useRef(null);
  const inView = useInView(ref, { once, amount });
  return [ref, inView];
}
function useGlobalSpotlight(){
  useEffect(()=>{
    const el = document.getElementById('spotlight');
    if(!el) return;
    const onMove=(e)=>{ el.style.setProperty('--mx', e.clientX+'px'); el.style.setProperty('--my', e.clientY+'px'); };
    window.addEventListener('mousemove', onMove);
    return ()=>window.removeEventListener('mousemove', onMove);
  },[]);
}

/* ============================================================
   PHONE — device frame (light theme, brand glow, MBMark titlebar)
   ============================================================ */
function Phone({screenKey}){
  const screen = SCREENS[screenKey] || SCREENS.ga_checkout;
  const mx = useMotionValue(0);
  const my = useMotionValue(0);
  const rotY = useTransform(mx, [-1, 1], [8, -8]);
  const rotX = useTransform(my, [-1, 1], [-6, 6]);
  const sRotY = useSpring(rotY, { stiffness:120, damping:16, mass:0.6 });
  const sRotX = useSpring(rotX, { stiffness:120, damping:16, mass:0.6 });
  const ref = useRef(null);
  const onMove = (e)=>{
    const r = ref.current.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    mx.set((e.clientX - cx) / (r.width/2));
    my.set((e.clientY - cy) / (r.height/2));
  };
  const onLeave = ()=>{ mx.set(0); my.set(0); };

  return (
    <div style={{perspective:1200, position:"relative", padding:"40px 20px", width:"100%", display:"flex", justifyContent:"center"}}>
      <div style={{position:"absolute", width:380, height:580, borderRadius:"50%", background:"radial-gradient(circle, rgba(139,61,255,0.42) 0%, rgba(139,61,255,0) 65%)", filter:"blur(46px)", zIndex:0, top:"50%", left:"50%", transform:"translate(-50%,-50%)", pointerEvents:"none"}}/>
      <motion.div
        ref={ref}
        onMouseMove={onMove}
        onMouseLeave={onLeave}
        style={{
          rotateY:sRotY, rotateX:sRotX, transformStyle:"preserve-3d",
          width:296, height:600, borderRadius:48,
          background:"linear-gradient(180deg, #232323 0%, #0a0a0a 100%)",
          padding:11, position:"relative", flexShrink:0,
          boxShadow:`0 1px 0 rgba(255,255,255,0.10) inset, 0 0 0 1px rgba(10,10,10,0.06), 0 30px 60px -20px rgba(10,10,10,0.35), 0 60px 120px -30px rgba(139,61,255,0.28), 0 100px 180px -50px rgba(139,61,255,0.16)`
        }}
        initial={{opacity:0, y:40, scale:0.96}}
        animate={{opacity:1, y:0, scale:1}}
        transition={{...SPRING.silky, delay:0.3}}>
        <div style={{position:"absolute",left:-2,top:108,width:3,height:30,background:"#161616",borderRadius:2}}/>
        <div style={{position:"absolute",left:-2,top:154,width:3,height:52,background:"#161616",borderRadius:2}}/>
        <div style={{position:"absolute",left:-2,top:218,width:3,height:52,background:"#161616",borderRadius:2}}/>
        <div style={{position:"absolute",right:-2,top:150,width:3,height:80,background:"#161616",borderRadius:2}}/>
        <div style={{borderRadius:37, overflow:"hidden", background:"var(--phone-bg)", height:"100%", position:"relative"}}>
          <div style={{position:"absolute",top:9,left:"50%",transform:"translateX(-50%)",width:96,height:28,background:"#000",borderRadius:14,zIndex:5}}/>
          <div style={{paddingTop:42,height:"100%",display:"flex",flexDirection:"column"}}>
            <AnimatePresence mode="wait">
              <motion.div
                key={screenKey}
                initial={{opacity:0, y:14, filter:"blur(6px)"}}
                animate={{opacity:1, y:0, filter:"blur(0px)"}}
                exit={{opacity:0, y:-10, filter:"blur(6px)"}}
                transition={{duration:0.42, ease:EASE}}
                style={{flex:"1 1 0",display:"flex",flexDirection:"column",minHeight:0}}>
                <div className="phone-screen">
                  <div className="phone-status">
                    <span className="num">9:41</span>
                    <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      <svg width="14" height="9" viewBox="0 0 14 9" fill="none">
                        <rect x="0.5" y="0.5" width="10" height="8" rx="1.5" stroke="var(--phone-text-1)"/>
                        <rect x="2" y="2" width="7" height="5" fill="var(--phone-text-1)"/>
                        <rect x="11.5" y="3" width="1.5" height="3" rx="0.4" fill="var(--phone-text-1)"/>
                      </svg>
                    </div>
                  </div>
                  <div className="phone-titlebar">
                    <MBMark size={20} radius={5}/>
                    <div style={{fontSize:11,fontWeight:600,color:"var(--phone-text-1)",letterSpacing:"-.01em"}}>{screen.title}</div>
                  </div>
                  <div style={{flex:"1 1 0",overflow:"hidden",minHeight:0}}>{screen.render()}</div>
                </div>
              </motion.div>
            </AnimatePresence>
            <div style={{height:22,display:"flex",alignItems:"center",justifyContent:"center",background:"var(--phone-bg)"}}>
              <div style={{width:108,height:4,background:"#000",borderRadius:2,opacity:.85}}/>
            </div>
          </div>
        </div>
      </motion.div>
    </div>
  );

          {String(active+1).padStart(2,"0")} <span style={{color:"var(--ink-4)"}}>/ {String(steps.length).padStart(2,"0")}</span>
        </div>
      </div>
      <div style={{position:"relative", height:1, background:"var(--line-2)", marginBottom:18}}>
        <motion.div animate={{width:`${progress*100}%`}} transition={SPRING.silky}
          style={{position:"absolute", inset:0, background:"var(--brand-deep)", boxShadow:"0 0 12px var(--brand-glow)"}}/>
      </div>
      <div className="step-rail" style={{display:"grid", gridTemplateColumns:`repeat(${steps.length}, minmax(0,1fr))`, gap:8}}>
        {steps.map((s, i)=>{
          const isActive = i === active, isPast = i < active;
          return (
            <button key={i} className="step-rail-item" onClick={()=>onPick(i)}
              style={{textAlign:"left", padding:"14px 0 0", borderTop:`1px solid ${isActive?"var(--brand-deep)":isPast?"var(--ink-2)":"var(--line-2)"}`, marginTop:-1, transition:"border-color 250ms", background:"transparent", position:"relative", cursor:"pointer"}}>
              {isActive && (<motion.div layoutId="step-glow" transition={SPRING.silky} style={{position:"absolute", top:-3, left:0, right:0, height:5, background:"var(--brand)", filter:"blur(8px)", opacity:0.9}}/>)}
              <div className="num" style={{fontSize:11, fontWeight:600, color: isActive?"var(--ink-1)":isPast?"var(--ink-2)":"var(--ink-4)", letterSpacing:"0.04em", marginBottom:6}}>{String(i+1).padStart(2,"0")}</div>
              <div style={{fontSize:13, fontWeight:isActive?600:500, color: isActive?"var(--ink-1)":isPast?"var(--ink-2)":"var(--ink-3)", lineHeight:1.3, letterSpacing:"-0.005em"}}>{s.title}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================
   METRIC CELL
   ============================================================ */
function MetricCell({label, text, accent, style, cls}){
  return (
    <div className={cls} style={{position:"relative", ...style}}>
      <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:13}}>
        <span style={{width:7, height:7, borderRadius:2, background: accent?"var(--brand-deep)":"var(--ink-1)", boxShadow: accent?"0 0 8px var(--brand-glow)":"none"}}/>
        <span style={{fontSize:10, textTransform:"uppercase", letterSpacing:"0.14em", color: accent?"var(--ink-2)":"var(--ink-3)", fontWeight:700}}>{label}</span>
      </div>
      <div style={{fontSize:17, color:"var(--ink-1)", lineHeight:1.35, letterSpacing:"-0.01em", fontWeight:500, textWrap:"pretty"}}>{text}</div>
    </div>
  );
}

/* ============================================================
   STEP INFO — text + metrics + nav ("В начало" on last step)
   ============================================================ */
function StepInfo({step, stepIdx, totalSteps, showMetrics, onPrev, onNext, onRestart}){
  const isLast = stepIdx === totalSteps - 1;
  return (
    <div style={{minWidth:0, paddingTop:8}}>
      <AnimatePresence mode="wait">
        <motion.div key={stepIdx} initial={{opacity:0, y:14}} animate={{opacity:1, y:0}} exit={{opacity:0, y:-10}} transition={{duration:0.4, ease:EASE}}>
          <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:22, flexWrap:"wrap"}}>
            <span className="eyebrow" style={{margin:0}}>Шаг {stepIdx+1}</span>
            <span style={{fontSize:11, color:"var(--ink-1)", fontWeight:500, padding:"5px 12px", border:"1px solid var(--line-2)", borderRadius:999, background:"var(--surface-1)"}}>{step.zone}</span>
          </div>
          <h2 style={{fontSize:"clamp(32px, 4.2vw, 60px)", fontWeight:700, letterSpacing:"-0.035em", lineHeight:1.03, color:"var(--ink-1)", margin:"0 0 22px", textWrap:"balance"}}>{step.title}</h2>
          <p style={{fontSize:17, color:"var(--ink-2)", lineHeight:1.55, margin:"0 0 34px", letterSpacing:"-0.005em", maxWidth:600, textWrap:"pretty"}}>{step.desc}</p>
          {showMetrics && step.metricPartner && (
            <div className="metrics-grid" style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:0, borderTop:"1px solid var(--line-2)", borderBottom:"1px solid var(--line-2)"}}>
              <MetricCell label="Ценность для NL Континент" text={step.metricPartner} accent={false} cls="m-l" style={{padding:"26px 30px 26px 0", borderRight:"1px solid var(--line-2)"}}/>
              <MetricCell label="Ценность для Альфа-Банка" text={step.metricBank} accent={true} cls="m-r" style={{padding:"26px 0 26px 30px"}}/>
            </div>
          )}
        </motion.div>
      </AnimatePresence>
      <div style={{display:"flex", gap:10, marginTop:34}}>
        <button disabled={stepIdx===0} onClick={onPrev}
          style={{display:"flex", alignItems:"center", gap:8, padding:"13px 22px", border:"1px solid var(--line-2)", borderRadius:12, fontSize:13, fontWeight:600, color: stepIdx===0?"var(--ink-4)":"var(--ink-1)", background:"var(--surface-1)", cursor: stepIdx===0?"default":"pointer", opacity: stepIdx===0?0.5:1, transition:"background 200ms"}}
          onMouseEnter={e=>{ if(stepIdx>0) e.currentTarget.style.background="var(--surface-2)"; }}
          onMouseLeave={e=>{ if(stepIdx>0) e.currentTarget.style.background="var(--surface-1)"; }}>
          <Ico d={ICONS.arrow_l} size={14}/> Назад
        </button>
        {isLast ? (
          <button onClick={onRestart}
            style={{display:"flex", alignItems:"center", gap:9, padding:"13px 26px", border:"none", borderRadius:12, fontSize:13, fontWeight:700, color:"#fff", background:"var(--brand)", cursor:"pointer", transition:"background 200ms", boxShadow:"0 8px 24px -6px var(--brand-glow)"}}
            onMouseEnter={e=>e.currentTarget.style.background="var(--brand-deep)"}
            onMouseLeave={e=>e.currentTarget.style.background="var(--brand)"}>
            <Ico d={ICONS.restart} size={14}/> В начало
          </button>
        ) : (
          <button onClick={onNext}
            style={{display:"flex", alignItems:"center", gap:10, padding:"13px 26px", border:"none", borderRadius:12, fontSize:13, fontWeight:600, color:"#fff", background:"var(--brand)", cursor:"pointer", transition:"background 200ms", boxShadow:"0 8px 24px -6px var(--brand-glow)"}}
            onMouseEnter={e=>e.currentTarget.style.background="var(--brand-deep)"}
            onMouseLeave={e=>e.currentTarget.style.background="var(--brand)"}>
            Далее <Ico d={ICONS.arrow_r} size={14}/>
          </button>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   MOBILE STEP NAV
   ============================================================ */
function MobileStepNav({current, total, onPrev, onNext}){
  const atStart = current === 0, atEnd = current === total - 1;
  return (
    <div className="mobile-step-nav" role="group" aria-label="Навигация по шагам">
      <button type="button" aria-label="Предыдущий шаг" disabled={atStart} onClick={onPrev}>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9l5 5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      <div className="counter num">
        <span style={{color:"var(--ink-1)"}}>{String(current+1).padStart(2,"0")}</span>
        <span style={{opacity:.4,margin:"0 6px"}}>/</span>
        <span style={{color:"var(--ink-3)"}}>{String(total).padStart(2,"0")}</span>
      </div>
      <button type="button" aria-label="Следующий шаг" disabled={atEnd} onClick={onNext}>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 4l5 5-5 5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
    </div>
  );
}

/* ============================================================
   PAY MODE TOGGLE — online / delivery (capability journeys)
   ============================================================ */
function PayModeToggle({payMode, setPayMode}){
  const modes = [{id:"online",label:"Онлайн"},{id:"delivery",label:"Доставка курьером"},{id:"offline",label:"Офлайн / ПВЗ"}];
  return (
    <div style={{display:"flex", justifyContent:"center", marginBottom:30}}>
      <LayoutGroup id="paymode">
        <div style={{display:"inline-flex", background:"var(--surface-1)", border:"1px solid var(--line-2)", borderRadius:14, padding:4, gap:2}}>
          {modes.map(m=>{
            const active = m.id===payMode;
            return (
              <button key={m.id} onClick={()=>setPayMode(m.id)}
                style={{position:"relative", padding:"9px 22px", borderRadius:11, fontSize:13, fontWeight:600, color: active?"#fff":"var(--ink-2)", background:"transparent", border:"none", cursor:"pointer", zIndex:1, transition:"color 200ms"}}>
                {active && <motion.div layoutId="paymode-pill" transition={{...SPRING.snappy}} style={{position:"absolute", inset:0, background:"var(--ink-1)", borderRadius:11, zIndex:-1}}/>}
                {m.label}
              </button>
            );
          })}
        </div>
      </LayoutGroup>
    </div>
  );
}

/* ============================================================
   CJM SECTION
   ============================================================ */
function CJMSection({activeJourney, activeStep, setActiveStep, showMetrics, payMode, setPayMode}){
  const j = journeys[activeJourney];
  const hasVariants = !!j.variants;
  const steps = hasVariants ? j.variants[payMode] : j.steps;
  const safeStep = Math.min(activeStep, steps.length - 1);
  const step = steps[safeStep];
  return (
    <section className="section" style={{maxWidth:1320, margin:"0 auto", padding:"50px 40px 100px", position:"relative"}}>
      {hasVariants && <PayModeToggle payMode={payMode} setPayMode={setPayMode}/>}
      <ProgressRail steps={steps} active={safeStep} onPick={setActiveStep}/>
      <div className="work-grid" style={{display:"grid", gridTemplateColumns:"minmax(340px, 0.9fr) minmax(0, 1.2fr)", gap:80, alignItems:"start"}}>
        <div className="phone-wrap" style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:20}}>
          <Phone screenKey={step.screen}/>
          <MobileStepNav current={safeStep} total={steps.length}
            onPrev={()=>setActiveStep(p=>Math.max(0, p-1))}
            onNext={()=>setActiveStep(p=>Math.min(steps.length-1, p+1))}/>
        </div>
        <StepInfo step={step} stepIdx={safeStep} totalSteps={steps.length} showMetrics={showMetrics}
          onPrev={()=>setActiveStep(p=>Math.max(0, p-1))}
          onNext={()=>setActiveStep(p=>Math.min(steps.length-1, p+1))}
          onRestart={()=>setActiveStep(0)}/>
      </div>
    </section>
  );
}

/* ============================================================
   BENEFITS — 3 groups (Клиент / NL Континент / Альфа-Банк)
   ============================================================ */
function BenefitCard({item, index, inView, accentMode, large}){
  const [hover, setHover] = useState(false);
  return (
    <motion.div
      initial={{opacity:0, y:30}} animate={inView?{opacity:1, y:0}:{}} transition={{duration:0.7, ease:EASE, delay:index*0.06}}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} className={large?"b-large":""}
      style={{gridColumn: large?"span 2":"span 1", gridRow:"span 1", background:"var(--surface-1)", border:"1px solid var(--line-1)", borderRadius:"var(--radius-lg)", padding:large?"34px 30px":"26px 22px", position:"relative", overflow:"hidden", transition:"border-color 300ms", cursor:"default"}}>
      <motion.div animate={{opacity:hover?1:0}} transition={{duration:0.4}} style={{position:"absolute", inset:0, pointerEvents:"none", background:"radial-gradient(circle at 80% 0%, rgba(139,61,255,0.16), transparent 60%)"}}/>
      <motion.div animate={{opacity:hover?1:0}} transition={{duration:0.3}} style={{position:"absolute", inset:0, borderRadius:"var(--radius-lg)", pointerEvents:"none", border:"1px solid var(--brand-deep)"}}/>
      <div style={{position:"relative", zIndex:1, height:"100%", display:"flex", flexDirection:"column"}}>
        <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:large?26:18, gap:16}}>
          <motion.div animate={{y: hover?-2:0}} transition={{duration:0.3}}
            style={{width:large?52:42, height:large?52:42, borderRadius:12, color:"var(--ink-1)", background: accentMode?"var(--brand)":"var(--surface-2)", border: accentMode?"1px solid var(--brand-deep)":"1px solid var(--line-2)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0}}>
            <Ico d={ICONS[item.icon]} size={large?24:20}/>
          </motion.div>
          {item.accent && (
            <div className="num" style={{fontSize: large?34:20, fontWeight:800, letterSpacing:"-0.03em", color:"var(--ink-1)", lineHeight:1, background: accentMode?"var(--brand)":"transparent", padding: accentMode?"4px 12px":0, borderRadius: accentMode?10:0}}>{item.accent}</div>
          )}
        </div>
        <div style={{fontSize: large?22:16.5, fontWeight:600, color:"var(--ink-1)", marginBottom:9, letterSpacing:"-0.015em", lineHeight:1.2}}>{item.title}</div>
        <div style={{fontSize: large?15:13, color:"var(--ink-3)", lineHeight:1.55, letterSpacing:"-0.005em", marginTop:"auto"}}>{item.desc}</div>
      </div>
    </motion.div>
  );
}
function BenefitGroup({eyebrow, title, sub, items, accentMode}){
  const [ref, inView] = useReveal(true, 0.15);
  return (
    <div ref={ref} style={{marginTop:72}}>
      <motion.div initial={{opacity:0, y:20}} animate={inView?{opacity:1, y:0}:{}} transition={{duration:0.7, ease:EASE}} style={{marginBottom:40, maxWidth:680}}>
        <div className="eyebrow" style={{color:"var(--ink-3)", marginBottom:13}}>{eyebrow}</div>
        <h3 style={{fontSize:"clamp(30px, 4.4vw, 58px)", fontWeight:700, letterSpacing:"-0.035em", lineHeight:1.05, color:"var(--ink-1)", margin:"0 0 13px", textWrap:"balance"}}>{title}</h3>
        <div style={{fontSize:15, color:"var(--ink-3)", letterSpacing:"-0.005em"}}>{sub}</div>
      </motion.div>
      <div className="bento-grid" style={{display:"grid", gridTemplateColumns:"repeat(3, minmax(0, 1fr))", gridAutoRows:"minmax(210px, auto)", gap:12}}>
        {items.map((b, i)=>(<BenefitCard key={i} item={b} index={i} inView={inView} accentMode={accentMode} large={i===0}/>))}
      </div>
    </div>
  );
}
function BenefitsSection(){
  return (
    <section className="section" style={{maxWidth:1320, margin:"0 auto", padding:"30px 40px 70px"}}>
      <BenefitGroup eyebrow="01 / Клиент" title="Преимущества для клиента" sub="Что получает покупатель NL Континент" items={benefitsClient} accentMode={true}/>
      <BenefitGroup eyebrow="02 / NL Континент" title="Преимущества для NL Континент" sub="Что даёт партнёру встроенный кошелёк" items={benefitsPartner} accentMode={false}/>
      <BenefitGroup eyebrow="03 / Альфа-Банк" title="Ценность для Альфа-Банка" sub="Стратегические эффекты партнёрского канала" items={benefitsBank} accentMode={true}/>
    </section>
  );
}

/* ============================================================
   FOOTER
   ============================================================ */
function Footer(){
  return (
    <footer style={{maxWidth:1320, margin:"0 auto", padding:"40px 40px 60px", borderTop:"1px solid var(--line-1)", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:16}}>
      <div style={{display:"flex", alignItems:"center", gap:12}}>
        <MBMark size={24} radius={6}/>
        <span style={{fontSize:11, color:"var(--ink-3)", fontWeight:500, letterSpacing:"-0.005em"}}>NL Pay · кошелёк для NL Континент · 2026</span>
      </div>
      <span style={{fontSize:11, color:"var(--ink-4)", letterSpacing:"0.04em"}}>Услугу оказывает АО «Альфа-Банк» · пример CJM для NL Континент</span>
    </footer>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const [activeJourney, setActiveJourney] = useState(0);
  const [activeStep, setActiveStep] = useState(0);
  const [payMode, setPayMode] = useState("online");
  const [showMetrics, setShowMetrics] = useState(true);
  const [scrolled, setScrolled] = useState(false);
  useGlobalSpotlight();
  useEffect(()=>{ setActiveStep(0); }, [activeJourney, payMode]);
  useEffect(()=>{
    const onScroll = ()=> setScrolled(window.scrollY > 40);
    onScroll();
    window.addEventListener('scroll', onScroll, {passive:true});
    return ()=>window.removeEventListener('scroll', onScroll);
  },[]);
  return (
    <div style={{minHeight:"100vh"}}>
      <Navbar showMetrics={showMetrics} setShowMetrics={setShowMetrics} scrolled={scrolled}/>
      <Hero activeJourney={activeJourney} setActiveJourney={setActiveJourney}/>
      <CJMSection activeJourney={activeJourney} activeStep={activeStep} setActiveStep={setActiveStep} showMetrics={showMetrics} payMode={payMode} setPayMode={setPayMode}/>
      <BenefitsSection/>
      <Footer/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
